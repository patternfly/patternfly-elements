<form id="basic">
  <fieldset>
    <legend>No flip</legend>
    <pf-v5-popover heading="Popover heading"
                body="Popovers are triggered by click rather than hover."
                footer="Popover footer"
                no-flip>
      <pf-v5-button>Toggle popover</pf-v5-button>
    </pf-v5-popover>
  </fieldset>

  <fieldset>
    <legend>Flip fallback</legend>
    <label>
      Popover positions
      <select id="position-select">
        <option value="top">top</option>
        <option value="right">right</option>
        <option value="bottom">bottom</option>
        <option value="left">left</option>
        <option value="top-start">top-start</option>
        <option value="top-end">top-end</option>
        <option value="right-start">right-start</option>
        <option value="right-end">right-end</option>
        <option value="bottom-start">bottom-start</option>
        <option value="bottom-end">bottom-end</option>
        <option value="left-start">left-start</option>
        <option value="left-end">left-end</option>
      </select>
    </label>
    <pf-v5-popover heading="Popover heading"
                body="Popovers are triggered by click rather than hover."
                footer="Popover footer"
                no-outside-click>
      <pf-v5-button>Toggle popover</pf-v5-button>
    </pf-v5-popover>
  </fieldset>
</form>

<script type="module">
  import '@patternfly/elements/pf-v5-popover/pf-v5-popover.js';
  import '@patternfly/elements/pf-v5-button/pf-v5-button.js';
  import '@patternfly/elements/pf-v5-icon/pf-v5-icon.js';

  // Positions
  const select = document.getElementById('position-select');
  select.addEventListener('change', event =>
    event.target
      .closest('fieldset')
      .querySelector('pf-v5-popover')
      .setAttribute('position', event.target.value));

  // Close popover from content
  const closeButton = document.getElementById('close-button');
  closeButton?.addEventListener('click', event => event.target.closest('pf-v5-popover').hide());

  // Alert variants
  const alert = document.getElementById('alert');
  alert?.addEventListener('change', event =>
    alert
      .querySelector('pf-v5-popover')
      .setAttribute('alert-severity', event.target.closest('form').elements.severity.value));

  document.addEventListener('submit', function(event) {
    event.preventDefault();
  });
</script>

<style>
  form {
    padding: 0 2rem;
    display: flex;
    flex-flow: row wrap;
    gap: 8px;
  }

  form h2 {
    width: 100%;
  }

  label {
    display: flex;
    flex-direction: column;
  }

  fieldset label {
    display: grid;
    align-content: center;
    display: contents;
  }

  select {
    display: block;
    margin-inline-end: auto;
    flex-basis: 100%;
  }

  #position-select {
    margin: 1rem 0;
  }

  #alert-select {
    margin-bottom: 1rem;
  }

  #no-padding pf-v5-popover::part(content) {
    --pf-v5-c-popover__content--PaddingTop: 0px;
    --pf-v5-c-popover__content--PaddingRight: 0px;
    --pf-v5-c-popover__content--PaddingBottom: 0px;
    --pf-v5-c-popover__content--PaddingLeft: 0px;
  }

  #auto-width pf-v5-popover::part(content) {
    --pf-v5-c-popover--MaxWidth: none;
    --pf-v5-c-popover--MinWidth: auto;
  }
</style>
