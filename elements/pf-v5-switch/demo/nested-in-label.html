<section>
  <form id="nested-label">
    <fieldset>
      <legend>Nested in a label</legend>
      <label> Status
        <pf-v5-switch name="status"></pf-v5-switch>
      </label>
      <pf-v5-button type="submit">Submit</pf-v5-button>
      <output>Submit to read status</output>
    </fieldset>
  </form>
</section>

<script type="module">
  import 'element-internals-polyfill';
  import '@patternfly/elements/pf-v5-switch/pf-v5-switch.js';
  import '@patternfly/elements/pf-v5-button/pf-v5-button.js';

  document.getElementById('nested-label').addEventListener('submit', /** @this {HTMLFormElement} */function(event) {
    event.preventDefault();
    this.querySelector('output').textContent = `Dark mode ${this.elements.status.checked ? 'on' : 'off'}`;
  });
</script>

<style>
  section {
    padding: 1em;
  }

  fieldset {
    display: grid;
    grid-template-columns: min-content max-content;
    gap: var(--pf-v5-c-switch--ColumnGap, var(--pf-v5-c-switch__label--PaddingLeft, 1rem));
    &:has(#reversed) {
      grid-template-columns: max-content min-content;
    }
  }

  label {
    color: var(--pf-v5-c-switch__label--Color, var(--pf-global--Color--dark-100, #151515));
  }

  pf-v5-switch:not([checked]) ~ label,
  label:has(~ pf-v5-switch:not([checked])) {
    color: var(--pf-v5-c-switch__input--not-checked__label--Color, var(--pf-global--disabled-color--100, #6a6e73));
  }

  #nested-label fieldset {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
  }

  #nested-label output {
    width: 100%;
  }
</style>
